<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>各专业索引 — 中国高等教育信息平台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">

  <!-- 导航栏 -->
  <nav class="bg-white shadow-sm sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-16">
        <a href="index.html" class="text-xl font-bold text-gray-900 hover:text-blue-600 transition-colors">
          中国高等教育信息平台
        </a>
        <div class="hidden md:flex items-center space-x-1">
          <a href="index.html" class="nav-link px-4 py-2 text-gray-700 hover:text-blue-600 rounded-lg transition-colors">首页</a>
          <a href="universities.html" class="nav-link px-4 py-2 text-gray-700 hover:text-blue-600 rounded-lg transition-colors">高校索引</a>
          <a href="majors.html" class="nav-link px-4 py-2 text-gray-700 hover:text-blue-600 rounded-lg transition-colors">专业索引</a>
        </div>
        <button onclick="toggleMenu()" class="md:hidden p-2 rounded-lg text-gray-600 hover:bg-gray-100">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
        </button>
      </div>
      <div id="mobile-menu" class="hidden md:hidden pb-4">
        <a href="index.html" class="block px-4 py-2 text-gray-700 hover:bg-gray-100 rounded-lg">首页</a>
        <a href="universities.html" class="block px-4 py-2 text-gray-700 hover:bg-gray-100 rounded-lg">高校索引</a>
        <a href="majors.html" class="block px-4 py-2 text-gray-700 hover:bg-gray-100 rounded-lg">专业索引</a>
      </div>
    </div>
  </nav>

  <main class="flex-1">
    <!-- 页面标题 -->
    <section class="bg-gradient-to-r from-emerald-600 to-teal-700 text-white">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
        <h1 class="text-3xl md:text-4xl font-bold">各专业索引</h1>
        <p class="mt-3 text-emerald-100 text-lg">按12大学科门类整理的中国大学本科专业</p>
      </div>
    </section>

    <!-- 搜索和内容区域 -->
    <section class="py-10">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <!-- 搜索栏和控制按钮 -->
        <div class="flex flex-col sm:flex-row sm:items-center gap-4 mb-8">
          <div class="relative flex-1 max-w-md">
            <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
            </svg>
            <input
              id="major-search"
              type="text"
              placeholder="搜索专业名称..."
              class="search-input w-full pl-10 pr-4 py-3 bg-white border border-gray-200 rounded-xl text-gray-700 placeholder-gray-400 focus:outline-none focus:border-emerald-400 transition-colors"
            >
          </div>
          <div class="flex gap-2">
            <button onclick="toggleAllMajors(true)" class="px-4 py-2 bg-emerald-500 text-white rounded-lg hover:bg-emerald-600 transition-colors text-sm font-medium">
              展开全部
            </button>
            <button onclick="toggleAllMajors(false)" class="px-4 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition-colors text-sm font-medium">
              折叠全部
            </button>
          </div>
        </div>

        <!-- 门类快速导航 -->
        <div class="flex flex-wrap gap-2 mb-8">
          <span class="text-sm text-gray-500 py-1 mr-1">快速跳转：</span>
          <a href="#majors-container" onclick="jumpToCategory(0)" class="text-xs px-2 py-1 bg-indigo-50 text-indigo-600 rounded hover:bg-indigo-100 transition-colors">哲</a>
          <a href="#majors-container" onclick="jumpToCategory(1)" class="text-xs px-2 py-1 bg-amber-50 text-amber-600 rounded hover:bg-amber-100 transition-colors">经</a>
          <a href="#majors-container" onclick="jumpToCategory(2)" class="text-xs px-2 py-1 bg-red-50 text-red-600 rounded hover:bg-red-100 transition-colors">法</a>
          <a href="#majors-container" onclick="jumpToCategory(3)" class="text-xs px-2 py-1 bg-green-50 text-green-600 rounded hover:bg-green-100 transition-colors">教</a>
          <a href="#majors-container" onclick="jumpToCategory(4)" class="text-xs px-2 py-1 bg-pink-50 text-pink-600 rounded hover:bg-pink-100 transition-colors">文</a>
          <a href="#majors-container" onclick="jumpToCategory(5)" class="text-xs px-2 py-1 bg-yellow-50 text-yellow-600 rounded hover:bg-yellow-100 transition-colors">史</a>
          <a href="#majors-container" onclick="jumpToCategory(6)" class="text-xs px-2 py-1 bg-cyan-50 text-cyan-600 rounded hover:bg-cyan-100 transition-colors">理</a>
          <a href="#majors-container" onclick="jumpToCategory(7)" class="text-xs px-2 py-1 bg-slate-100 text-slate-600 rounded hover:bg-slate-200 transition-colors">工</a>
          <a href="#majors-container" onclick="jumpToCategory(8)" class="text-xs px-2 py-1 bg-lime-50 text-lime-600 rounded hover:bg-lime-100 transition-colors">农</a>
          <a href="#majors-container" onclick="jumpToCategory(9)" class="text-xs px-2 py-1 bg-teal-50 text-teal-600 rounded hover:bg-teal-100 transition-colors">医</a>
          <a href="#majors-container" onclick="jumpToCategory(10)" class="text-xs px-2 py-1 bg-blue-50 text-blue-600 rounded hover:bg-blue-100 transition-colors">管</a>
          <a href="#majors-container" onclick="jumpToCategory(11)" class="text-xs px-2 py-1 bg-fuchsia-50 text-fuchsia-600 rounded hover:bg-fuchsia-100 transition-colors">艺</a>
        </div>

        <!-- 专业列表 -->
        <div id="majors-container" class="space-y-4">
          <!-- JS 动态渲染 -->
        </div>
      </div>
    </section>
  </main>

  <!-- 页脚 -->
  <footer class="bg-gray-900 text-gray-400 py-8">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center text-sm">
      <p>中国高等教育信息平台 &copy; 2026 — 数据仅供参考，以教育部官方公布为准</p>
    </div>
  </footer>

  <script src="assets/js/data.js?v=f9476ce"></script>
  <script src="assets/js/main.js?v=f9476ce"></script>
</body>
</html>
